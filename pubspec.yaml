name: lifelink_blood
description: "LifeLink - Blood Donation & Emergency Connection Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0

  # State Management & Navigation
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7

  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.2.0
  firebase_messaging: ^15.1.0
  firebase_analytics: ^11.3.0

  # Image Handling
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # Location & Maps
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  google_maps_flutter: ^2.9.0

  # Notifications
  flutter_local_notifications: ^19.0.0

  # Local Storage
  shared_preferences: ^2.3.2

  # Networking
  dio: ^5.7.0

  # Charts & Analytics
  fl_chart: ^0.69.0

  # Payments
  razorpay_flutter: ^1.3.7

  # Utilities
  intl: ^0.19.0
  encrypt: ^5.0.3
  pin_code_fields: ^8.0.1
  uuid: ^4.5.1
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  path_provider: ^2.1.4
  connectivity_plus: ^6.1.0
  permission_handler: ^11.3.1
  package_info_plus: ^8.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

